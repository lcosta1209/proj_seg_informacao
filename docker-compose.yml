version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: proj-seg-informacao

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: "Express"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      - sqlserver
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    entrypoint: >
      bash -c "
      sleep 20 &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$${DB_PASSWORD}\" -C
      -Q \"IF DB_ID('curriculos') IS NULL CREATE DATABASE [curriculos];\"
      "

volumes:
  sqlserver_data: