<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Currículo</title>
</head>
<body>

    <h1>Novo Currículo</h1>

    {% if form.errors %}
        <div>
            <p>Corrija os erros abaixo:</p>
            <ul>
                {% for field in form %}
                    {% for erro in field.errors %}
                        <li>{{ field.label }}: {{ erro }}</li>
                    {% endfor %}
                {% endfor %}
            </ul>
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>

    <a href="{% url 'inicio' %}">Voltar</a>

</body>
</html>
